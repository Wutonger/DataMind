  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-key}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

server:
  port: 8080

logging:
  level:
    com.datamine: DEBUG
    org.springframework.ai: DEBUG
